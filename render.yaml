services:
  - type: web
    name: mis-dekhli-chinese-dz
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_FOLDER
        value: mis-dekhli-chinese-dz
      - key: MAX_VIDEO_MB
        value: 100
      - key: TEACHER_NAME
        value: Mis Dekhli Teacher
      - key: TEACHER_EMAIL
        sync: false
      - key: TEACHER_PASSWORD
        sync: false
